version: "3.9"

networks:
  llm-net:
    driver: bridge

volumes:
  gateway-data:
  scheduler-data:
  monitoring-data:
  node1-data:
  node2-data:

services:

  scheduler:
    build:
      context: .
      dockerfile: scheduler/Dockerfile
    container_name: llm-scheduler
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: /data/scheduler.db
      HEARTBEAT_TIMEOUT_S: "30"
      DEFAULT_STRATEGY: round_robin
      INTERNAL_TOKEN: ${INTERNAL_TOKEN:-internal-secret-change-me}
    volumes:
      - scheduler-data:/data
    networks: [llm-net]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    container_name: llm-gateway
    ports:
      - "8080:8080"
    environment:
      SCHEDULER_URL: http://scheduler:8001
      MONITORING_URL: http://monitoring:8002
      DATABASE_URL: /data/gateway.db
      SECRET_KEY: ${SECRET_KEY:-changeme-use-a-real-secret-in-production}
      INTERNAL_TOKEN: ${INTERNAL_TOKEN:-internal-secret-change-me}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
    volumes:
      - gateway-data:/data
    networks: [llm-net]
    depends_on:
      scheduler:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  monitoring:
    build:
      context: .
      dockerfile: monitoring/Dockerfile
    container_name: llm-monitoring
    ports:
      - "8002:8002"
    environment:
      DATABASE_URL: /data/monitoring.db
      GATEWAY_URL: http://gateway:8080
      SCHEDULER_URL: http://scheduler:8001
      SCRAPE_INTERVAL_S: "15"
      INTERNAL_TOKEN: ${INTERNAL_TOKEN:-internal-secret-change-me}
    volumes:
      - monitoring-data:/data
    networks: [llm-net]
    depends_on:
      gateway:
        condition: service_healthy
    restart: unless-stopped

  inference-node-1:
    build:
      context: .
      dockerfile: inference-node/Dockerfile
    container_name: llm-node-1
    ports:
      - "8003:8003"
    environment:
      NODE_ID: node-1
      NODE_HOST: inference-node-1
      NODE_PORT: "8003"
      # vLLM runs on the host machine
      VLLM_URL: http://host.docker.internal:8000
      SCHEDULER_URL: http://scheduler:8001
      MONITORING_URL: http://monitoring:8002
      DATABASE_URL: /data/node1.db
      HEARTBEAT_INTERVAL_S: "10"
      INTERNAL_TOKEN: ${INTERNAL_TOKEN:-internal-secret-change-me}
    volumes:
      - node1-data:/data
    networks: [llm-net]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      scheduler:
        condition: service_healthy
    restart: unless-stopped

  inference-node-2:
    build:
      context: .
      dockerfile: inference-node/Dockerfile
    container_name: llm-node-2
    ports:
      - "8004:8003"
    environment:
      NODE_ID: node-2
      NODE_HOST: inference-node-2
      NODE_PORT: "8003"
      VLLM_URL: http://host.docker.internal:8000
      SCHEDULER_URL: http://scheduler:8001
      MONITORING_URL: http://monitoring:8002
      DATABASE_URL: /data/node2.db
      HEARTBEAT_INTERVAL_S: "10"
      INTERNAL_TOKEN: ${INTERNAL_TOKEN:-internal-secret-change-me}
    volumes:
      - node2-data:/data
    networks: [llm-net]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      scheduler:
        condition: service_healthy
    restart: unless-stopped
